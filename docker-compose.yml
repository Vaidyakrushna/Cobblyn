version: '3.8'

services:
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cobblyn_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=cobblyn_db
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_EMAIL=admin@cobblyn.com
      - ADMIN_PASSWORD=Cobblyn@2026
    depends_on:
      - mongodb
    networks:
      - cobblyn_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - cobblyn_network

volumes:
  mongodb_data:

networks:
  cobblyn_network:
